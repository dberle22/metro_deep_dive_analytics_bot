version: 1
catalog_name: table_catalog
description: Approved Gold-layer tables for the chatbot semantic contract.
tables:
  - table_id: population_demographics
    schema: gold
    table_name: population_demographics
    subject_area: population
    description: Population and demographic profile mart built from ACS-derived age, race, and education KPI tables.
    grain: one row per geo_level + geo_id + year
    primary_key:
      - geo_level
      - geo_id
      - year
    geo_id_field: geo_id
    geo_level_field: geo_level
    geo_name_field: geo_name
    time_field: year
    supported_geo_levels:
      - us
      - region
      - division
      - state
      - cbsa
      - county
      - place
      - zcta
      - tract
    upstream_dependencies:
      - silver.age_kpi
      - silver.race_kpi
      - silver.education_kpi
    notes:
      - Time coverage in the current dictionary snapshot is 2012-2024.
      - Growth metrics at longer windows are sparse for the earliest years.
    status: active

  - table_id: housing_core_wide
    schema: gold
    table_name: housing_core_wide
    subject_area: housing
    description: Housing stock, tenure, rent, affordability, and permit activity mart with ACS as the base grain.
    grain: one row per geo_level + geo_id + year
    primary_key:
      - geo_level
      - geo_id
      - year
    geo_id_field: geo_id
    geo_level_field: geo_level
    geo_name_field: geo_name
    time_field: year
    supported_geo_levels:
      - us
      - region
      - division
      - state
      - cbsa
      - county
      - place
      - zcta
      - tract
    upstream_dependencies:
      - silver.housing_kpi
      - silver.income_kpi
      - silver.hud_fmr_wide
      - silver.hud_rent50_wide
      - silver.bps_wide
      - silver.age_kpi
    notes:
      - HUD benchmark rent fields are sparse and mostly 2023-only in the current snapshot.
      - BPS permit fields are only populated for supported BPS geographies and years.
    status: active

  - table_id: economics_income_wide
    schema: gold
    table_name: economics_income_wide
    subject_area: income
    description: Income and earnings mart combining ACS household income context with BEA personal income measures.
    grain: one row per geo_level + geo_id + year
    primary_key:
      - geo_level
      - geo_id
      - year
    geo_id_field: geo_id
    geo_level_field: geo_level
    geo_name_field: geo_name
    time_field: year
    supported_geo_levels:
      - state
      - cbsa
      - county
    upstream_dependencies:
      - silver.age_kpi
      - silver.income_kpi
      - silver.bea_regional_cainc1_wide
      - silver.bea_regional_cainc4_wide
    notes:
      - Current Gold table coverage is limited to state, cbsa, and county.
      - Time coverage in the current dictionary snapshot is 2012-2023.
      - Some BEA-derived fields are null where upstream personal income series are unavailable.
    status: active

  - table_id: affordability_wide
    schema: gold
    table_name: affordability_wide
    subject_area: housing
    description: Deferred affordability mart joining housing and income context for benchmarked affordability analyses.
    grain: one row per geo_level + geo_id + year
    geo_id_field: geo_id
    geo_level_field: geo_level
    geo_name_field: geo_name
    time_field: year
    supported_geo_levels:
      - state
      - cbsa
      - county
      - place
      - zcta
      - tract
